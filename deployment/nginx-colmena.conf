server {
    listen 80;
    server_name colmena-ss.es www.colmena-ss.es;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name colmena-ss.com www.colmena-ss.com colmena-ss.org www.colmena-ss.org colmena-ss.store www.colmena-ss.store;
    return 301 https://colmena-ss.es$request_uri;
}
