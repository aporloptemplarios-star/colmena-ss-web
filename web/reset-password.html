<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nueva contraseña | Colmena</title>
  <link rel="stylesheet" href="/web/styles.css">
</head>
<body>
  <nav class="nav">
    <div class="brand">COLMENA RESET</div>
    <div class="nav-links">
      <a href="/">Inicio</a>
      <a href="/login">Login</a>
    </div>
  </nav>
  <section class="section">
    <h2>Crear nueva contraseña</h2>
    <p>Usa una contraseña segura con mayúscula, minúscula y número.</p>
    <div class="card">
      <div class="form">
        <input id="reset-password" type="password" placeholder="Nueva contraseña">
        <input id="reset-password-confirm" type="password" placeholder="Confirmar nueva contraseña">
        <button class="btn" onclick="resetPasswordWeb()">Actualizar contraseña</button>
        <p class="muted" id="reset-result"></p>
      </div>
    </div>
  </section>
  <script src="/web/env.js"></script>
  <script src="/web/app.js"></script>
</body>
</html>
