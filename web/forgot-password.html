<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar contraseña | Colmena</title>
  <link rel="stylesheet" href="/web/styles.css">
</head>
<body>
  <nav class="nav">
    <div class="brand">COLMENA RECOVERY</div>

      <a href="/">Inicio</a>

      <div class="form">

        <button class="btn" onclick="forgotPasswordWeb()">Enviar recuperación</button>
        <p class="muted" id="forgot-result"></p>
      </div>

  </section>
  <script src="/web/env.js"></script>
  <script src="/web/app.js"></script>

</html>
